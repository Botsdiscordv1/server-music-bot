name: Refresh YouTube Cookies

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium

      - name: Download previous cookies from Gist
        run: |
          curl -s -o cookies.txt "${{ secrets.GIST_RAW_URL }}" || echo "No previous cookies"

      - name: Refresh cookies via YouTube
        run: |
          node << 'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');

          (async () => {
            const browser = await chromium.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage']
            });
            const context = await browser.newContext();
            const page = await context.newPage();

            if (fs.existsSync('cookies.txt')) {
              const raw = fs.readFileSync('cookies.txt', 'utf-8');
              const lines = raw.split('\n').filter(l => l && !l.startsWith('#'));
              for (const line of lines) {
                const parts = line.split('\t');
                if (parts.length >= 7) {
                  try {
                    await context.addCookies([{
                      name: parts[5],
                      value: parts[6],
                      domain: parts[0].replace(/^\./, ''),
                      path: parts[2],
                      secure: parts[3] === 'TRUE',
                      expires: parseInt(parts[4]) || -1
                    }]);
                  } catch {}
                }
              }
              console.log('Loaded previous cookies');
            }

            await page.goto('https://www.youtube.com', {
              waitUntil: 'networkidle',
              timeout: 30000
            });
            await page.waitForTimeout(3000);

            const cookies = await context.cookies();
            let output = '# Netscape HTTP Cookie File\n';
            output += '# https://curl.haxx.se/docs/http-cookies.html\n';
            output += `# Generated: ${new Date().toISOString()}\n\n`;
            for (const c of cookies) {
              const domain = '.' + c.domain;
              output += `${domain}\tTRUE\t${c.path}\t${c.secure ? 'TRUE' : 'FALSE'}\t${Math.floor(c.expires) || 0}\t${c.name}\t${c.value}\n`;
            }
            fs.writeFileSync('cookies.txt', output);
            console.log(`Exported ${cookies.length} cookies`);

            await browser.close();
          })();
          EOF

      - name: Upload cookies to Gist
        run: |
          python3 << 'PYEOF'
          import json
          with open('cookies.txt') as f:
              content = f.read()
          with open('payload.json', 'w') as f:
              json.dump({"files": {"yt-cookies.txt": {"content": content}}}, f)
          PYEOF
          curl -s -L -X PATCH "https://api.github.com/gists/${{ secrets.GIST_ID }}" \
            -H "Authorization: token ${{ secrets.GIST_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @payload.json
